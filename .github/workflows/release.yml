name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        env:
          KRONK_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir dist
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DKRONK_VERSION=%KRONK_VERSION% installer\kronk.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kronk ${{ steps.version.outputs.version }}
          body: |
            Oh yeah, it's all coming together.

            ## Installation

            **Installer:** Download and run `kronk-${{ steps.version.outputs.version }}-windows-x64-setup.exe`

            **Portable:** Download `kronk.exe` and add it to your PATH.

            ## After install

            1. Edit your config: `kronk config edit`
            2. Set your backend path and model
            3. Install as a service: `kronk service install` (run as admin)
          files: |
            target/release/kronk.exe
            dist/kronk-${{ steps.version.outputs.version }}-windows-x64-setup.exe
