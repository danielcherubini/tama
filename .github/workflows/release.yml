name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
    steps:
      - name: Extract version
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "version_num=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Release builds — cache only dependency sources + release target.
      # No index (fast to download), no debug artifacts.
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/release
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys:
            ${{ runner.os }}-cargo-release-

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build Leptos WASM frontend
        working-directory: crates/tama-web
        run: trunk build --release

      - name: Build release
        run: cargo build --release

      - name: Create self-update archive (Windows)
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/tama.exe -DestinationPath target/release/tama-x86_64-pc-windows-msvc.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        env:
          TAMA_VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir dist
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DTAMA_VERSION=%TAMA_VERSION% installer\tama.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            target/release/tama.exe
            target/release/tama-x86_64-pc-windows-msvc.zip
            dist/*.exe

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/release
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys:
            ${{ runner.os }}-cargo-release-

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build Leptos WASM frontend
        working-directory: crates/tama-web
        run: trunk build --release

      - name: Build release
        run: cargo build --release

      - name: Create self-update archive (Linux)
        run: |
          cd target/release
          tar czf tama-x86_64-unknown-linux-gnu.tar.gz tama

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build .deb package
        run: cargo deb -p tama

      - name: Build .rpm package
        run: |
          strip -s target/release/tama
          cargo generate-rpm -p crates/tama-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            target/release/tama
            target/release/tama-x86_64-unknown-linux-gnu.tar.gz
            target/debian/*.deb
            target/generate-rpm/*.rpm

  release:
    needs: [version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: linux

      - name: Debug linux artifacts
        run: find linux -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tama ${{ needs.version.outputs.version }}
          body: |
            A local AI server with automatic backend management.

            ## Installation

            ### Windows
            **Installer:** Download and run `tama-${{ needs.version.outputs.version }}-windows-x64-setup.exe`
            **Portable:** Download `tama.exe` and add it to your PATH.

            ### Linux (Debian/Ubuntu)
            ```bash
            sudo dpkg -i tama_${{ needs.version.outputs.version_num }}_amd64.deb
            ```

            ### Linux (Fedora/RHEL)
            ```bash
            rpm -i tama-${{ needs.version.outputs.version_num }}-1.x86_64.rpm
            ```

            ## After install

            1. Edit your config: `tama config edit`
            2. Set your backend path and model
            3. Install as a service (Windows): `tama service install` (run as admin)
            4. Open the web UI: http://localhost:11435
          files: |
            windows/**/*.exe
            windows/**/tama-x86_64-pc-windows-msvc.zip
            linux/**/tama
            linux/**/tama-x86_64-unknown-linux-gnu.tar.gz
            linux/**/*.deb
            linux/**/*.rpm
