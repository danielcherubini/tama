name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
    steps:
      - name: Extract version
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "version_num=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: cmd
        env:
          KRONK_VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir dist
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DKRONK_VERSION=%KRONK_VERSION% installer\kronk.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            target/release/kronk.exe
            dist/*.exe

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build .deb package
        run: cargo deb -p kronk

      - name: Build .rpm package
        run: |
          strip -s target/release/kronk
          cargo generate-rpm -p crates/kronk-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            target/release/kronk
            target/debian/*.deb
            target/generate-rpm/*.rpm

  release:
    needs: [version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: linux

      - name: Debug linux artifacts
        run: find linux -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kronk ${{ needs.version.outputs.version }}
          body: |
            Oh yeah, it's all coming together.

            ## Installation

            ### Windows
            **Installer:** Download and run `kronk-${{ needs.version.outputs.version }}-windows-x64-setup.exe`
            **Portable:** Download `kronk.exe` and add it to your PATH.

            ### Linux (Debian/Ubuntu)
            ```bash
            sudo dpkg -i kronk_${{ needs.version.outputs.version_num }}_amd64.deb
            ```

            ### Linux (Fedora/RHEL)
            ```bash
            sudo rpm -i kronk-${{ needs.version.outputs.version_num }}-1.x86_64.rpm
            ```

            ## After install

            1. Edit your config: `kronk config edit`
            2. Set your backend path and model
            3. Install as a service (Windows): `kronk service install` (run as admin)
          files: |
            windows/**/*.exe
            linux/**/kronk
            linux/**/*.deb
            linux/**/*.rpm
