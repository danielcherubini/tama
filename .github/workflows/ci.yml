name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache only dependency sources (no index, no debug artifacts).
      # Registry index is ~200 MB of plain-text git repos that re-downloads fast.
      # Debug target dirs are ephemeral and waste cache space — release key auto-evicts old caches.
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/release
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys:
            ${{ runner.os }}-cargo-deps-

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build Leptos WASM frontend
        working-directory: crates/koji-web
        run: trunk build

      - name: Run tests (workspace)
        run: cargo test --workspace -- --nocapture

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (koji-web SSR)
        run: cargo clippy --package koji-web --features ssr --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/release
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys:
            ${{ runner.os }}-cargo-deps-

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build Leptos WASM frontend
        working-directory: crates/koji-web
        run: trunk build

      - name: Run tests (workspace)
        run: cargo test --workspace -- --nocapture

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check
